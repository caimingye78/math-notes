<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 470" width="740" height="470">
  <rect width="740" height="470" fill="white"/>
  <text x="370.0" y="26" text-anchor="middle" font-size="15" font-family="serif">
    解直角三角形: 两次仰角测塔高
  </text>
  <text x="370.0" y="46" text-anchor="middle" font-size="12" fill="#666">
    A 测仰角30&#176;, 前进 AB=20 到 B 测仰角60&#176; &#8594; 塔高 h = 10&#8730;3 &#8776; 17.32
  </text>
  <line x1="131.0" y1="381.2" x2="609.0" y2="381.2" stroke="#8d6e63" stroke-width="2"/>
  <line x1="557.3" y1="381.2" x2="557.3" y2="157.5" stroke="#444" stroke-width="4"/>
  <text x="563.3" y="153.5" font-size="12" fill="#444">塔顶 T</text>
  <rect x="557.3" y="369.2" width="12" height="12" fill="none" stroke="#444" stroke-width="1"/>
  <text x="561.3" y="397.2" font-size="12" fill="#444">D</text>
  <text x="563.3" y="269.4" font-size="12" fill="#C62828">h=10&#8730;3</text>
  <line x1="169.8" y1="381.2" x2="557.3" y2="157.5" stroke="#1565C0" stroke-width="1.6"/>
  <line x1="428.1" y1="381.2" x2="557.3" y2="157.5" stroke="#2E7D32" stroke-width="1.6"/>
  <circle cx="169.8" cy="381.2" r="4" fill="#000"/>
  <text x="165.8" y="399.2" font-size="12">A</text>
  <circle cx="428.1" cy="381.2" r="4" fill="#000"/>
  <text x="424.1" y="399.2" font-size="12">B</text>
  <path d="M 203.8 381.2 A 34 34 0 0 0 199.2 364.2" fill="none" stroke="#1565C0" stroke-width="1.4"/>
  <text x="205.8" y="373.2" font-size="11" fill="#1565C0">30&#176;</text>
  <path d="M 458.1 381.2 A 30 30 0 0 0 443.1 355.3" fill="none" stroke="#2E7D32" stroke-width="1.4"/>
  <text x="458.1" y="371.2" font-size="11" fill="#2E7D32">60&#176;</text>
  <text x="285.0" y="399.2" font-size="11">AB=20</text>

  <rect x="490" y="66" width="234" height="92" fill="white" fill-opacity="0.93" stroke="#ccc" rx="4"/>
  <text x="502" y="86" font-size="11">tan30&#176; = h/AD -&gt; AD = h&#8730;3</text>
  <text x="502" y="104" font-size="11">tan60&#176; = h/BD -&gt; BD = h/&#8730;3</text>
  <text x="502" y="122" font-size="11">AD - BD = AB = 20</text>
  <text x="502" y="144" font-size="11" fill="#C62828">h(2/&#8730;3)=20 -&gt; h=10&#8730;3&#8776;17.32</text>
</svg>
