  <text x="468" y="98" font-size="11">面积 = |行列式| &#215; S&#8320;  (S&#8320;=|e&#8321;&#215;e&#8322;|)</text>
  <text x="468" y="118" font-size="11">比值里 S&#8320; 抵消 -&gt; 只看行列式</text>
  <text x="468" y="138" font-size="11">S(GBC)/S(ABC) = (1/6)/(1/2) = 1/3</text>
