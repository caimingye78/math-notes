<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 640" width="620" height="640">
  <rect width="620" height="640" fill="white"/>
  <text x="310.0" y="26" text-anchor="middle" font-size="15" font-family="serif">
    复数的极坐标形式: z = r(cos&#952; + i&#183;sin&#952;) = r&#183;e^(i&#952;)
  </text>
  <text x="310.0" y="46" text-anchor="middle" font-size="12" fill="#666">
    例: z = 2(cos60&#176;+i&#183;sin60&#176;) = 1 + &#8730;3&#183;i
  </text>
  <line x1="77.0" y1="468.5" x2="543.0" y2="468.5" stroke="#000" stroke-width="1"/>
  <line x1="193.5" y1="585.0" x2="193.5" y2="119.0" stroke="#000" stroke-width="1"/>
  <text x="539.0" y="484.5" font-size="12" font-style="italic">实轴 (Re)</text>
  <text x="199.5" y="125.0" font-size="12" font-style="italic">虚轴 (Im)</text>
  <text x="310.0" y="482.5" text-anchor="middle" font-size="9">1</text>
  <text x="186.5" y="355.0" text-anchor="end" font-size="9">1i</text>
  <text x="426.5" y="482.5" text-anchor="middle" font-size="9">2</text>
  <text x="186.5" y="238.5" text-anchor="end" font-size="9">2i</text>
  <text x="543.0" y="482.5" text-anchor="middle" font-size="9">3</text>
  <text x="186.5" y="122.0" text-anchor="end" font-size="9">3i</text>
  <line x1="193.5" y1="468.5" x2="310.0" y2="266.7" stroke="#9C27B0" stroke-width="2.5"/>
  <text x="207.8" y="363.6" font-size="12" fill="#7B1FA2">r = |z| = 2</text>
  <path d="M 233.5 468.5 A 40 40 0 0 0 213.5 433.9" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <text x="235.7" y="443.5" font-size="12" fill="#E65100">&#952;=60&#176;</text>
  <line x1="310.0" y1="266.7" x2="310.0" y2="468.5" stroke="#1565C0" stroke-width="1.4" stroke-dasharray="4 3"/>
  <line x1="310.0" y1="266.7" x2="193.5" y2="266.7" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="229.8" y="483.5" font-size="11" fill="#1565C0">a=2cos60=1</text>
  <text x="197.5" y="367.6" font-size="11" fill="#2E7D32">b=2sin60=&#8730;3</text>
  <circle cx="310.0" cy="266.7" r="5" fill="#9C27B0"/>
  <text x="318.0" y="262.7" font-size="13" fill="#7B1FA2">z = 1 + &#8730;3 i</text>
</svg>
