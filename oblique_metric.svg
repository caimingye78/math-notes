  <rect x="448" y="78" width="254" height="112" fill="white" fill-opacity="0.94" stroke="#ccc" rx="4"/>
  <text x="460" y="98" font-size="11">点积矩阵 G = [ 1      cos&#969; ]</text>
  <text x="460" y="114" font-size="11">                     [ cos&#969;   1   ]</text>
  <text x="460" y="136" font-size="11">u&#183;v = ac+bd+(ad+bc)cos&#969;</text>
  <text x="460" y="156" font-size="11">|v|&#178; = 4+2.25+2(2)(1.5)cos65&#176;</text>
  <text x="460" y="176" font-size="11" fill="#7B1FA2">= 8.786,  |v| = 2.964</text>
